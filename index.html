<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>purnama wedding</title>
    <link href="bootstrap-5.3.8-dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Simply Countdown -->
    <link rel="stylesheet" href="countdown/default.css" />

    <script src="countdown/simplyCountdown.umd.js"></script>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section
      id="hero"
      class="hero w-100 h-100 p-3 mx-auto text-center d-flex justify-content-center align-items-center text-white"
    >
      <main>
        <h4>Kepada Bapak/Ibu/Saudara/i,</h4>
        <h1>
          <span>Farhan Ramadhan</span>
          <span>&</span>
          <span>Rinchan</span>
        </h1>
        <p>Akan melangsungkan resepsi pernikahan dalam :</p>
        <div class="simply-countdown"></div>
        <a href="#undangan" class="btn btn-lg mt-4">Lihat Undangan</a>
      </main>
    </section>
    <script src="bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
    <script>
      simplyCountdown(".simply-countdown", {
        year: 2026, // Target year (required)
        month: 11, // Target month [1-12] (required)
        day: 2, // Target day [1-31] (required)
        hours: 8, // Target hour [0-23], default: 0
        words: {
          // Custom labels, with lambda for plurals
          days: { root: "Hari", lambda: (root, n) => (n > 1 ? root + "" : root) },
          hours: { root: "Jam", lambda: (root, n) => (n > 1 ? root + "" : root) },
          minutes: { root: "Menit", lambda: (root, n) => (n > 1 ? root + "" : root) },
          seconds: { root: "Detik", lambda: (root, n) => (n > 1 ? root + "" : root) },
        },
      });
    </script>
  </body>
</html>
